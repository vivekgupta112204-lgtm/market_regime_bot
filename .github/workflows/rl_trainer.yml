name: Train RL AI Agent

on:
  schedule:
    # Train the RL model every weekend (Saturday 12:00 UTC) to learn from the week's mistakes
    - cron: '0 12 * * 6'
  workflow_dispatch: # Manual trigger

jobs:
  train_model:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pre-Train Reinforcement Learning (PPO) Model
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python3 rl/training.py

      - name: Commit and Push Trained Model
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add models/ppo_agent.zip
          git commit -m "Auto-Update: RL Model Retraining Complete" || echo "No changes to commit"
          git push origin main

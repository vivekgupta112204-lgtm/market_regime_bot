name: MLOps Weekend Retrainer

on:
  schedule:
    # Runs at 00:00 UTC every Sunday (Weekend when markets are closed)
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  auto_retrain_and_commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial permission to allow git push from the runner
    timeout-minutes: 20

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Fetch full history to ensure we can commit back cleanly
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Architecture Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute Autonomous MLOps Training
        run: |
          echo "Initiating Self-Healing Architecture..."
          python mlops_retrainer.py

      - name: Auto-Commit & Push Updated Brain (Weights)
        run: |
          # Configure Git Identity
          git config --global user.name "HMM-MLOps-Bot"
          git config --global user.email "bot@marketregime.ai"
          
          # Stage ONLY the models directory (where the zip changed)
          git add models/
          
          # Check if there are actual changes before committing
          if git diff --staged --quiet; then
            echo "No structural drift detected. Neural weights remain unchanged."
          else
            git commit -m "🤖 MLOps Auto-Commit: Synced latest PPO Neural Network weights after weekend matrix tuning."
            git push origin main
            echo "Successfully pushed retrained brain into repository."
          fi

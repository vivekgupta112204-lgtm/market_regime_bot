version: '3.8'

services:
  trading-bot:
    build: 
      context: ../../
      dockerfile: deployment/docker/Dockerfile
    container_name: hmm_trading_bot
    restart: always
    env_file:
      - ../../.env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ../../data:/app/data
      - ../../logs:/app/logs
      - ../../saved_models:/app/saved_models
      - ../../reports:/app/reports
    ports:
      - "8000:8000"
      - "8501:8501"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - bot_network

  nginx:
    image: nginx:alpine
    container_name: bot_nginx_proxy
    restart: always
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - trading-bot
    networks:
      - bot_network

networks:
  bot_network:
    driver: bridge
